name: My Scheduled Workflow

on:
  schedule:
    - cron: '*/20 * * * *'
  # Best Practice: Always add this to allow manual triggering for testing
  workflow_dispatch: 

jobs:
  periodic-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Run Script
        run: echo "Executing scheduled task..."
